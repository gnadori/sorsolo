<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorsoló - Dark Mode</title>
    <style>
        :root {
            --bg-black: #000000;
            --sidebar-gray: #121212;
            --card-gray: #181818;
            --spotify-green: #1db954;
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 900px;
            background: linear-gradient(180deg, #222222 0%, #121212 100%);
            border-radius: 8px;
            display: flex;
            padding: 24px;
            gap: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Bal oldali panel - beviteli mező */
        .input-section {
            flex: 1;
            background-color: var(--sidebar-gray);
            padding: 20px;
            border-radius: 8px;
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            letter-spacing: -0.5px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #2a2a2a;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 12px;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        textarea:focus {
            background-color: #333333;
            box-shadow: 0 0 0 1px #555;
        }

        button {
            background-color: var(--spotify-green);
            color: black;
            border: none;
            border-radius: 500px;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #1ed760;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Jobb oldali panel - eredmények */
        .result-section {
            flex: 1.2;
        }

        .section-title {
            color: var(--text-white);
            font-size: 1.4rem;
            margin-bottom: 16px;
        }

        #resultList {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .name-card {
            background-color: var(--card-gray);
            padding: 12px 16px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            transition: background-color 0.3s;
            border: 1px solid transparent;
        }

        .name-card:hover {
            background-color: #282828;
        }

        .index-number {
            color: var(--text-gray);
            margin-right: 16px;
            font-size: 0.9rem;
            width: 20px;
        }

        .name-text {
            font-weight: 500;
        }

        .placeholder-text {
            color: var(--text-gray);
            font-style: italic;
        }

        /* Reszponzivitás */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="input-section">
        <h2>Sorsolási lista</h2>
        <textarea id="nameInput" placeholder="Nevek (soronként egy név)..."></textarea>
        <button onclick="shuffleNames()">KEVERÉS</button>
    </div>

    <div class="result-section">
        <h2 class="section-title">Új sorrend</h2>
        <div id="resultList">
            <p class="placeholder-text">Add meg a neveket és kattints a gombra!</p>
        </div>
    </div>
</div>

<script>
    function shuffleNames() {
        const input = document.getElementById('nameInput').value;
        const resultContainer = document.getElementById('resultList');
        
        let names = input.split('\n')
                         .map(name => name.trim())
                         .filter(name => name !== "");

        if (names.length === 0) {
            return;
        }

        // Fisher-Yates keverés
        for (let i = names.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [names[i], names[j]] = [names[j], names[i]];
        }

        resultContainer.innerHTML = "";
        names.forEach((name, index) => {
            const div = document.createElement('div');
            div.className = 'name-card';
            div.innerHTML = `
                <span class="index-number">${index + 1}</span>
                <span class="name-text">${name}</span>
            `;
            resultContainer.appendChild(div);
        });
    }
</script>

</body>
</html>
