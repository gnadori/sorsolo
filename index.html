<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorsoló - Spotify Style</title>
    <style>
        :root {
            --bg-black: #000000;
            --sidebar-gray: #121212;
            --card-gray: #181818;
            --spotify-green: #1db954;
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 900px;
            background: linear-gradient(180deg, #222222 0%, #121212 100%);
            border-radius: 12px;
            display: flex;
            padding: 40px 24px 24px 24px; /* Felső padding a gombnak */
            gap: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative; /* Ez kell a gomb pozicionálásához */
        }

        /* A GOMB ÚJ HELYE */
        .shuffle-button {
            position: absolute;
            top: -25px; /* Kilóg egy kicsit a dobozból, mint az igazi Spotify-on */
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--spotify-green);
            color: black;
            border: none;
            border-radius: 500px;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            z-index: 10;
            white-space: nowrap;
        }

        /* Ha pontosan a két oszlop közé/felé szeretnéd, a bal oldali margót állíthatod */
        .shuffle-button:hover {
            transform: translateX(-50%) scale(1.05);
            background-color: #1ed760;
        }

        .input-section {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
        }

        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background-color: #2a2a2a;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 12px;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        .result-section {
            flex: 1.2;
        }

        #resultList {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .name-card {
            background-color: transparent;
            padding: 8px 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            transition: background-color 0.2s;
        }

        .name-card:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .index-number {
            color: var(--text-gray);
            margin-right: 16px;
            font-size: 0.9rem;
            width: 20px;
            text-align: right;
        }

        .placeholder-text {
            color: var(--text-gray);
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                margin-top: 40px;
            }
            .shuffle-button {
                top: -20px;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <button class="shuffle-button" onclick="shuffleNames()">KEVERÉS</button>

    <div class="input-section">
        <h2>Sorsolási lista</h2>
        <textarea id="nameInput" placeholder="Nevek (soronként egy név)..."></textarea>
    </div>

    <div class="result-section">
        <h2>Új sorrend</h2>
        <div id="resultList">
            <p class="placeholder-text">Add meg a neveket és nyomd meg a gombot fent!</p>
        </div>
    </div>
</div>

<script>
    function shuffleNames() {
        const input = document.getElementById('nameInput').value;
        const resultContainer = document.getElementById('resultList');
        
        let names = input.split('\n')
                         .map(name => name.trim())
                         .filter(name => name !== "");

        if (names.length === 0) {
            alert("Írj be neveket!");
            return;
        }

        for (let i = names.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [names[i], names[j]] = [names[j], names[i]];
        }

        resultContainer.innerHTML = "";
        names.forEach((name, index) => {
            const div = document.createElement('div');
            div.className = 'name-card';
            div.innerHTML = `
                <span class="index-number">${index + 1}</span>
                <span class="name-text">${name}</span>
            `;
            resultContainer.appendChild(div);
        });
    }
</script>

</body>
</html>
